name: Update LeetCode Dashboard

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push README updates back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetches full history for accurate streaks and timeline data

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Analytics Script
        run: python scripts/update-readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update LeetCode dashboard metrics" && git push)
